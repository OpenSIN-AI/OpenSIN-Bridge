<!--
  ==============================================================================
  OpenSIN Bridge - UI Component
  ==============================================================================
  
  DESCRIPTION / BESCHREIBUNG:
  This HTML file provides the user interface for the OpenSIN Bridge.
  It displays the connection status, version, and tools count.
  
  WHY IT IS IMPORTANT:
  Users must be able to visually verify that the extension is "Connected" (Green).
  Without this visual feedback, debugging connection issues is impossible.
  
  CONSEQUENCES:
  Do not remove the status indicators. Agents rely on the user confirming the status.
  ==============================================================================
-->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    body { width: 300px; padding: 14px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 13px; background: #0d1117; color: #c9d1d9; }
    h1 { font-size: 15px; margin: 0 0 10px; background: linear-gradient(135deg, #58a6ff, #238636); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .status { padding: 10px; border-radius: 8px; margin-bottom: 10px; font-size: 12px; }
    .connected { background: #12261e; color: #3fb950; border: 1px solid #238636; }
    .disconnected { background: #2d1214; color: #f85149; border: 1px solid #da3633; }
    .info { font-size: 11px; color: #484f58; }
  </style>
</head>
<body>
  <h1>OpenSIN Bridge</h1>
  <div id="status" class="status disconnected">Checking connection...</div>
  <div id="versionInfo" class="info"></div>
  <script src="popup.js"></script>
</body>
</html>
