  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0d0d0d;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .container { max-width: 640px; width: 100%; text-align: center; }
    .logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
    }
    .logo-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
    }
    .logo {
      font-size: 2.75rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1.1;
      background: linear-gradient(180deg, #ffffff 0%, #a0a0a0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .tagline {
      color: #666;
      font-size: 0.95rem;
      font-weight: 400;
      letter-spacing: -0.01em;
      margin-bottom: 3rem;
    }
    .status-bar {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: #161616;
      border: 1px solid #262626;
      border-radius: 100px;
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 2.5rem;
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.3); }
      50% { opacity: 0.7; box-shadow: 0 0 0 4px rgba(34, 197, 94, 0); }
    }
    .quick-links {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
      margin-bottom: 3rem;
    }
    .quick-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      padding: 1.25rem 0.5rem;
      background: #161616;
      border: 1px solid #262626;
      border-radius: 16px;
      color: #888;
      text-decoration: none;
      transition: all 0.2s ease;
    }
    .quick-link:hover {
      border-color: #404040;
      color: #e8e8e8;
      background: #1a1a1a;
      transform: translateY(-2px);
    }
    .quick-link svg {
      width: 24px; height: 24px;
      stroke: currentColor; fill: none;
      stroke-width: 1.5;
      stroke-linecap: round; stroke-linejoin: round;
    }
    .quick-link-label { font-size: 0.8rem; font-weight: 500; letter-spacing: -0.01em; }
    .quick-link-desc { font-size: 0.7rem; color: #444; }
    .footer { color: #333; font-size: 0.7rem; letter-spacing: 0.02em; }
  </style>
</head>
