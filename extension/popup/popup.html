<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>OpenSIN Bridge</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 320px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; }
    .container { padding: 20px; }
    .logo { text-align: center; margin-bottom: 16px; }
    .logo h1 { font-size: 18px; color: #38bdf8; }
    .logo p { font-size: 12px; color: #64748b; }
    .status { padding: 12px; border-radius: 8px; margin-bottom: 16px; text-align: center; font-size: 13px; }
    .status.active { background: #064e3b; color: #34d399; }
    .status.inactive { background: #1e293b; color: #94a3b8; }
    .status.paywall { background: #451a03; color: #fbbf24; }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 4px; }
    .form-group input { width: 100%; padding: 8px 12px; border: 1px solid #334155; border-radius: 6px; background: #1e293b; color: #e2e8f0; font-size: 14px; }
    .form-group input:focus { outline: none; border-color: #38bdf8; }
    .btn { width: 100%; padding: 10px; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 8px; }
    .btn-primary { background: #38bdf8; color: #0f172a; }
    .btn-primary:hover { background: #7dd3fc; }
    .btn-secondary { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
    .btn-upgrade { background: linear-gradient(135deg, #f59e0b, #ef4444); color: white; }
    .btn-upgrade:hover { opacity: 0.9; }
    .error { color: #f87171; font-size: 12px; margin-top: 8px; text-align: center; }
    .link { text-align: center; margin-top: 8px; }
    .link a { color: #38bdf8; font-size: 12px; text-decoration: none; }
    .hidden { display: none; }
    .footer { text-align: center; margin-top: 16px; padding-top: 12px; border-top: 1px solid #1e293b; }
    .footer p { font-size: 11px; color: #475569; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1>OpenSIN Bridge</h1>
      <p>Autonomous Browser Automation</p>
    </div>

    <div id="status-bar" class="status inactive">Checking status...</div>

    <!-- Login Form -->
    <div id="login-view">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter password">
      </div>
      <button class="btn btn-primary" id="login-btn">Sign In</button>
      <div class="link">
        <a href="https://my.opensin.ai/signup" target="_blank">Create Account</a>
      </div>
      <div id="login-error" class="error hidden"></div>
    </div>

    <!-- Logged In View -->
    <div id="active-view" class="hidden">
      <button class="btn btn-primary" id="start-btn">Start Automation</button>
      <button class="btn btn-secondary" id="stop-btn">Stop</button>
      <button class="btn btn-secondary" id="logout-btn">Sign Out</button>
    </div>

    <!-- Paywall View -->
    <div id="paywall-view" class="hidden">
      <p style="text-align:center; margin-bottom:12px; font-size:13px;">Upgrade to unlock all features</p>
      <button class="btn btn-upgrade" id="upgrade-btn">Upgrade to Pro — 5 EUR/month</button>
      <button class="btn btn-secondary" id="paywall-logout-btn">Sign Out</button>
    </div>

    <div class="footer">
      <p>OpenSIN-AI v1.0.0</p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
